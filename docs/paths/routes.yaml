/api/health:
  get:
    tags:
      - Health
    summary: Health check
    responses:
      "200":
        description: API is healthy
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                message:
                  type: string
                timestamp:
                  type: string
                  format: date-time
      "500":
        $ref: "#/components/responses/InternalServerError"
