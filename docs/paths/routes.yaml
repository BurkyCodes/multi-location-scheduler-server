      "200":
        description: User details retrieved
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserDetailResponse"
      "400":
        $ref: "#/components/responses/BadRequestError"
      "401":
        $ref: "#/components/responses/UnauthorizedError"
      "404":
        $ref: "#/components/responses/NotFoundError"
      "500":
        $ref: "#/components/responses/InternalServerError"
    parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: string
      - name: garage_id
        in: path
        required: true
        schema:
          type: string
      - name: fromDate
        in: query
        required: false
        schema:
          type: string
          format: date
      - name: toDate
        in: query
        required: false
        schema:
          type: string
          format: date
    security:
      - bearerAuth: []
